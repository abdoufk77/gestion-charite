<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Espace Admin Organisation</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">GestionCharité</a>
        <div class="ms-auto d-flex gap-2 align-items-center">
            <span class="navbar-text text-white me-2">
                Bonjour, <strong th:text="${utilisateur.nom}"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger btn-sm">Déconnexion</button>
            </form>
        </div>
    </div>
</nav>

<!-- En-tête -->
<div class="container mt-4 mb-4">
    <div class="card shadow-sm p-4 bg-white">
        <div class="d-flex align-items-center gap-3">
            <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center"
                 style="width:56px;height:56px;font-size:1.5rem;">
                <span th:text="${#strings.substring(utilisateur.nom,0,1).toUpperCase()}"></span>
            </div>
            <div>
                <h4 class="mb-0" th:text="${utilisateur.nom + ' ' + utilisateur.prenom}"></h4>
                <small class="text-muted" th:text="${utilisateur.email}"></small>
                <span class="badge bg-success ms-2">Admin Organisation</span>
            </div>
        </div>
    </div>
</div>

<!-- Actions disponibles -->
<div class="container mb-5">
    <h5 class="mb-3 text-secondary">Actions caritatives disponibles</h5>

    <div th:if="${#lists.isEmpty(actions)}" class="alert alert-info">
        Aucune action caritative disponible pour le moment.
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${!#lists.isEmpty(actions)}">
        <div class="col" th:each="action : ${actions}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <span class="badge bg-success mb-2" th:text="${action.categorie}"></span>
                    <h5 class="card-title" th:text="${action.titre}"></h5>
                    <p class="card-text text-muted" th:text="${action.description}"></p>
                    <p class="mb-1">
                        <small class="text-muted">
                            Organisation :
                            <strong th:text="${action.organisation != null ? action.organisation.nom : 'N/A'}"></strong>
                        </small>
                    </p>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <small class="text-muted">
                        <span th:text="${#dates.format(action.dateDebut, 'dd/MM/yyyy')}"></span>
                        →
                        <span th:text="${#dates.format(action.dateFin, 'dd/MM/yyyy')}"></span>
                    </small>
                    <div class="d-flex gap-1">
                        <button class="btn btn-success btn-sm">Gérer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-success text-white text-center py-3">
    <small>&copy; 2026 GestionCharité</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
