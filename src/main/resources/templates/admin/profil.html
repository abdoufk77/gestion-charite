<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profil — Admin Organisation</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{admin/fragments/sidebar :: sidebar('profil')}"></div>

    <div class="admin-main">

        <div class="admin-topbar">
            <h5 class="mb-0 fw-bold text-success">
                <i class="bi bi-person-fill me-2"></i>Mon Profil
            </h5>
            <a th:href="@{/admin/organisation/modifier}" class="btn btn-success btn-sm">
                <i class="bi bi-pencil me-1"></i>Modifier l'organisation
            </a>
        </div>

        <div class="admin-content">

            <div th:if="${succes}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${succes}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">

                <!-- Compte admin -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white fw-semibold border-bottom">
                            <i class="bi bi-person-circle me-2 text-success"></i>Compte administrateur
                        </div>
                        <div class="card-body p-4 text-center">
                            <div class="bg-success text-white rounded-circle mx-auto d-flex align-items-center justify-content-center mb-3"
                                 style="width:72px;height:72px;font-size:1.8rem;">
                                <span th:text="${#strings.substring(utilisateur.nom,0,1).toUpperCase()}"></span>
                            </div>
                            <h5 class="fw-bold mb-0" th:text="${utilisateur.nom + ' ' + utilisateur.prenom}"></h5>
                            <span class="badge bg-success mb-3">Admin Organisation</span>
                            <div class="text-start border-top pt-3">
                                <div class="text-muted small">Email</div>
                                <div class="fw-semibold small" th:text="${utilisateur.email}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Organisation -->
                <div class="col-lg-8" th:if="${utilisateur.organisation != null}">

                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center gap-4">
                                <div class="flex-shrink-0">
                                    <div th:if="${utilisateur.organisation.logoUrl}"
                                         class="border rounded-3 overflow-hidden shadow-sm"
                                         style="width:90px;height:90px;">
                                        <img th:src="${utilisateur.organisation.logoUrl}" alt="Logo"
                                             style="width:100%;height:100%;object-fit:cover;">
                                    </div>
                                    <div th:unless="${utilisateur.organisation.logoUrl}"
                                         class="bg-success bg-opacity-10 text-success rounded-3 d-flex align-items-center justify-content-center border"
                                         style="width:90px;height:90px;">
                                        <i class="bi bi-building" style="font-size:2rem;"></i>
                                    </div>
                                </div>
                                <div>
                                    <h4 class="fw-bold mb-1" th:text="${utilisateur.organisation.nom}"></h4>
                                    <span class="badge bg-success" th:text="${utilisateur.organisation.statut}"></span>
                                    <div class="text-muted small mt-1" th:if="${utilisateur.organisation.siteWeb}">
                                        <i class="bi bi-globe me-1"></i>
                                        <a th:href="${utilisateur.organisation.siteWeb}"
                                           th:text="${utilisateur.organisation.siteWeb}"
                                           target="_blank" class="text-muted"></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-white fw-semibold border-bottom">
                            <i class="bi bi-info-circle me-2 text-success"></i>Informations
                        </div>
                        <div class="card-body p-4">
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <div class="text-muted small fw-semibold">ADRESSE LÉGALE</div>
                                    <div th:text="${utilisateur.organisation.adresseLegale ?: '—'}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small fw-semibold">N° FISCAL</div>
                                    <div th:text="${utilisateur.organisation.numIdentFiscale ?: '—'}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small fw-semibold">CONTACT PRINCIPAL</div>
                                    <div th:text="${utilisateur.organisation.contactPrincipal ?: '—'}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small fw-semibold">TÉLÉPHONE</div>
                                    <div th:text="${utilisateur.organisation.telephone ?: '—'}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 mb-4" th:if="${utilisateur.organisation.description}">
                        <div class="card-header bg-white fw-semibold border-bottom">
                            <i class="bi bi-file-text me-2 text-success"></i>Description
                        </div>
                        <div class="card-body p-4">
                            <p class="text-muted mb-0" th:text="${utilisateur.organisation.description}"></p>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0" th:if="${utilisateur.organisation.mission}">
                        <div class="card-header bg-white fw-semibold border-bottom">
                            <i class="bi bi-bullseye me-2 text-success"></i>Mission &amp; Valeurs
                        </div>
                        <div class="card-body p-4">
                            <p class="mb-0" style="white-space:pre-line;"
                               th:text="${utilisateur.organisation.mission}"></p>
                        </div>
                    </div>

                </div>

            </div>
        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
