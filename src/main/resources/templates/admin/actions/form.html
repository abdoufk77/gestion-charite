<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${modeEdition} ? 'Modifier une action' : 'Nouvelle action'">Action</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <!-- Sidebar -->
    <div th:replace="~{admin/fragments/sidebar :: sidebar('actions')}"></div>

    <!-- Zone principale -->
    <div class="admin-main">

        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/admin/actions}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold text-success">
                    <span th:text="${modeEdition} ? 'Modifier l\'action' : 'Nouvelle action caritative'"></span>
                </h5>
            </div>
        </div>

        <!-- Contenu scrollable -->
        <div class="admin-content">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">

                            <!-- Formulaire création -->
                            <form th:if="${!modeEdition}"
                                  th:action="@{/admin/actions/nouvelle}"
                                  th:object="${action}" method="post" novalidate>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control"
                                           th:field="*{titre}"
                                           th:classappend="${#fields.hasErrors('titre')} ? 'is-invalid'"
                                           placeholder="Ex: Campagne de vaccination">
                                    <div class="invalid-feedback" th:errors="*{titre}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                                    <textarea class="form-control" rows="4"
                                              th:field="*{description}"
                                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                              placeholder="Décrivez l'action..."></textarea>
                                    <div class="invalid-feedback" th:errors="*{description}"></div>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Date début <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control"
                                               th:field="*{dateDebut}"
                                               th:classappend="${#fields.hasErrors('dateDebut')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{dateDebut}"></div>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Date fin <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control"
                                               th:field="*{dateFin}"
                                               th:classappend="${#fields.hasErrors('dateFin')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{dateFin}"></div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Catégorie <span class="text-danger">*</span></label>
                                    <select class="form-select"
                                            th:field="*{categorie}"
                                            th:classappend="${#fields.hasErrors('categorie')} ? 'is-invalid'">
                                        <option value="">-- Choisir --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{categorie}"></div>
                                </div>

                                <!-- Type d'action -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Type d'action <span class="text-danger">*</span></label>
                                    <div class="d-flex gap-3">
                                        <div th:each="type : ${typesAction}" class="form-check">
                                            <input class="form-check-input" type="radio"
                                                   th:id="'type_' + ${type}"
                                                   th:field="*{typeAction}"
                                                   th:value="${type}"
                                                   onchange="toggleTypeFields()">
                                            <label class="form-check-label d-flex align-items-center gap-1"
                                                   th:for="'type_' + ${type}">
                                                <i class="bi" th:classappend="${type.name() == 'FINANCIER'} ? 'bi-cash-coin text-success' : 'bi-people-fill text-primary'"></i>
                                                <span th:text="${type.name() == 'FINANCIER'} ? 'Collecte financière' : 'Participation physique'"></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('typeAction')}" th:errors="*{typeAction}"></div>
                                </div>

                                <!-- Champ conditionnel FINANCIER -->
                                <div id="champ-financier" class="mb-3" style="display:none;">
                                    <label class="form-label fw-semibold">Objectif financier (MAD) <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" min="1" class="form-control"
                                           th:field="*{objectifMontant}"
                                           th:classappend="${#fields.hasErrors('objectifMontant')} ? 'is-invalid'"
                                           placeholder="Ex: 50000">
                                    <div class="invalid-feedback" th:errors="*{objectifMontant}"></div>
                                </div>

                                <!-- Champ conditionnel PHYSIQUE -->
                                <div id="champ-physique" class="mb-3" style="display:none;">
                                    <label class="form-label fw-semibold">Nombre de places maximum <span class="text-danger">*</span></label>
                                    <input type="number" min="1" class="form-control"
                                           th:field="*{nombrePlacesMax}"
                                           th:classappend="${#fields.hasErrors('nombrePlacesMax')} ? 'is-invalid'"
                                           placeholder="Ex: 30">
                                    <div class="invalid-feedback" th:errors="*{nombrePlacesMax}"></div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-success">
                                        <i class="bi bi-plus-circle me-1"></i> Créer l'action
                                    </button>
                                    <a th:href="@{/admin/actions}" class="btn btn-outline-secondary">Annuler</a>
                                </div>
                            </form>

                            <!-- Formulaire modification -->
                            <form th:if="${modeEdition}"
                                  th:action="@{'/admin/actions/' + ${actionId} + '/modifier'}"
                                  th:object="${action}" method="post" novalidate>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control"
                                           th:field="*{titre}"
                                           th:classappend="${#fields.hasErrors('titre')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{titre}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                                    <textarea class="form-control" rows="4"
                                              th:field="*{description}"
                                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                                    <div class="invalid-feedback" th:errors="*{description}"></div>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Date début <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control"
                                               th:field="*{dateDebut}"
                                               th:classappend="${#fields.hasErrors('dateDebut')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{dateDebut}"></div>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-semibold">Date fin <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control"
                                               th:field="*{dateFin}"
                                               th:classappend="${#fields.hasErrors('dateFin')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{dateFin}"></div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Catégorie <span class="text-danger">*</span></label>
                                    <select class="form-select"
                                            th:field="*{categorie}"
                                            th:classappend="${#fields.hasErrors('categorie')} ? 'is-invalid'">
                                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{categorie}"></div>
                                </div>

                                <!-- Type d'action -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Type d'action <span class="text-danger">*</span></label>
                                    <div class="d-flex gap-3">
                                        <div th:each="type : ${typesAction}" class="form-check">
                                            <input class="form-check-input" type="radio"
                                                   th:id="'type_edit_' + ${type}"
                                                   th:field="*{typeAction}"
                                                   th:value="${type}"
                                                   onchange="toggleTypeFields()">
                                            <label class="form-check-label d-flex align-items-center gap-1"
                                                   th:for="'type_edit_' + ${type}">
                                                <i class="bi" th:classappend="${type.name() == 'FINANCIER'} ? 'bi-cash-coin text-success' : 'bi-people-fill text-primary'"></i>
                                                <span th:text="${type.name() == 'FINANCIER'} ? 'Collecte financière' : 'Participation physique'"></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('typeAction')}" th:errors="*{typeAction}"></div>
                                </div>

                                <!-- Champ conditionnel FINANCIER -->
                                <div id="champ-financier" class="mb-3" style="display:none;">
                                    <label class="form-label fw-semibold">Objectif financier (MAD) <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" min="1" class="form-control"
                                           th:field="*{objectifMontant}"
                                           th:classappend="${#fields.hasErrors('objectifMontant')} ? 'is-invalid'"
                                           placeholder="Ex: 50000">
                                    <div class="invalid-feedback" th:errors="*{objectifMontant}"></div>
                                </div>

                                <!-- Champ conditionnel PHYSIQUE -->
                                <div id="champ-physique" class="mb-3" style="display:none;">
                                    <label class="form-label fw-semibold">Nombre de places maximum <span class="text-danger">*</span></label>
                                    <input type="number" min="1" class="form-control"
                                           th:field="*{nombrePlacesMax}"
                                           th:classappend="${#fields.hasErrors('nombrePlacesMax')} ? 'is-invalid'"
                                           placeholder="Ex: 30">
                                    <div class="invalid-feedback" th:errors="*{nombrePlacesMax}"></div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save me-1"></i> Enregistrer les modifications
                                    </button>
                                    <a th:href="@{/admin/actions}" class="btn btn-outline-secondary">Annuler</a>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleTypeFields() {
        const selected = document.querySelector('input[name="typeAction"]:checked');
        const type = selected ? selected.value : null;
        document.getElementById('champ-financier').style.display = (type === 'FINANCIER') ? 'block' : 'none';
        document.getElementById('champ-physique').style.display = (type === 'PHYSIQUE') ? 'block' : 'none';
    }
    document.addEventListener('DOMContentLoaded', toggleTypeFields);
</script>
</body>
</html>
