<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifier l'organisation</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{admin/fragments/sidebar :: sidebar('organisation')}"></div>

    <div class="admin-main">

        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/admin/profil}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold text-success">
                    <i class="bi bi-building-gear me-2"></i>Modifier le profil de l'organisation
                </h5>
            </div>
        </div>

        <div class="admin-content">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <form th:action="@{/admin/organisation/modifier}"
                          th:object="${org}" method="post"
                          enctype="multipart/form-data" novalidate>

                        <!-- Logo -->
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white fw-semibold border-bottom">
                                <i class="bi bi-image me-2 text-success"></i>Logo de l'organisation
                            </div>
                            <div class="card-body p-4">
                                <div class="d-flex align-items-center gap-4">
                                    <div class="flex-shrink-0">
                                        <div th:if="${logoActuel}" class="border rounded-3 overflow-hidden"
                                             style="width:100px;height:100px;">
                                            <img th:src="${logoActuel}" alt="Logo"
                                                 style="width:100%;height:100%;object-fit:cover;">
                                        </div>
                                        <div th:unless="${logoActuel}"
                                             class="bg-success bg-opacity-10 text-success rounded-3 d-flex align-items-center justify-content-center border"
                                             style="width:100px;height:100px;">
                                            <i class="bi bi-building" style="font-size:2.5rem;"></i>
                                        </div>
                                    </div>
                                    <div class="flex-grow-1">
                                        <label class="form-label fw-semibold">Choisir un logo</label>
                                        <input type="file" class="form-control" name="logo" id="logoInput"
                                               accept="image/png,image/jpeg,image/jpg,image/webp">
                                        <div class="form-text">PNG, JPG ou WEBP — max 5 Mo</div>
                                    </div>
                                </div>
                                <div class="mt-3 d-none" id="previewWrapper">
                                    <label class="form-label text-muted small">Aperçu :</label>
                                    <img id="logoPreview" src="#" alt="Aperçu"
                                         class="rounded-3 border"
                                         style="max-height:120px;max-width:200px;object-fit:contain;">
                                </div>
                            </div>
                        </div>

                        <!-- Informations générales -->
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white fw-semibold border-bottom">
                                <i class="bi bi-info-circle me-2 text-success"></i>Informations générales
                            </div>
                            <div class="card-body p-4">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control"
                                               th:field="*{nom}"
                                               th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{nom}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Adresse légale <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control"
                                               th:field="*{adresseLegale}"
                                               th:classappend="${#fields.hasErrors('adresseLegale')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{adresseLegale}"></div>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-semibold">Contact principal</label>
                                        <input type="text" class="form-control"
                                               th:field="*{contactPrincipal}"
                                               placeholder="Nom du responsable">
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-semibold">Téléphone</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                            <input type="tel" class="form-control"
                                                   th:field="*{telephone}"
                                                   placeholder="+212 6XX XX XX XX">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Site web</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-globe"></i></span>
                                            <input type="url" class="form-control"
                                                   th:field="*{siteWeb}"
                                                   placeholder="https://www.exemple.ma">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Présentation & Mission -->
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white fw-semibold border-bottom">
                                <i class="bi bi-file-text me-2 text-success"></i>Présentation &amp; Mission
                            </div>
                            <div class="card-body p-4">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Description générale</label>
                                        <textarea class="form-control" th:field="*{description}" rows="3"
                                                  placeholder="Présentez votre organisation en quelques lignes..."></textarea>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Mission &amp; Valeurs</label>
                                        <textarea class="form-control" th:field="*{mission}" rows="5"
                                                  placeholder="Décrivez la mission, les valeurs et les objectifs..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Boutons -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/admin/profil}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Annuler
                            </a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save me-1"></i>Enregistrer
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('logoInput').addEventListener('change', function () {
        const file = this.files[0];
        const wrapper = document.getElementById('previewWrapper');
        const preview = document.getElementById('logoPreview');
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { preview.src = e.target.result; wrapper.classList.remove('d-none'); };
            reader.readAsDataURL(file);
        } else {
            wrapper.classList.add('d-none');
        }
    });
</script>
</body>
</html>
