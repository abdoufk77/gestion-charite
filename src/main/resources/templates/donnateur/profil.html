<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mon profil</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{donnateur/fragments/navbar :: navbar('profil')}"></div>

<div class="container mt-4 mb-5">

    <!-- Alertes flash -->
    <div th:if="${succes}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${succes}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erreur}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${erreur}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Colonne gauche : avatar + stats -->
        <div class="col-md-4">

            <!-- Carte avatar -->
            <div class="card border-0 shadow-sm text-center p-4 mb-4">
                <div class="d-flex justify-content-center mb-3">
                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center"
                         style="width:80px;height:80px;font-size:2rem;font-weight:bold;">
                        <span th:text="${#strings.substring(utilisateur.prenom,0,1).toUpperCase()}"></span>
                    </div>
                </div>
                <h5 class="fw-bold mb-0"
                    th:text="${utilisateur.prenom + ' ' + utilisateur.nom}"></h5>
                <small class="text-muted" th:text="${utilisateur.email}"></small>
                <span class="badge bg-success mt-2">Donateur</span>
            </div>

            <!-- Stats -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;font-size:1.3rem;">
                        <i class="bi bi-cash-coin"></i>
                    </div>
                    <div>
                        <div class="fw-bold fs-5" th:text="${totalDons}"></div>
                        <small class="text-muted">Don(s) effectué(s)</small>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;font-size:1.3rem;">
                        <i class="bi bi-wallet2"></i>
                    </div>
                    <div>
                        <div class="fw-bold fs-5">
                            <span th:text="${#numbers.formatDecimal(montantTotal, 0, 'COMMA', 2, 'POINT')}"></span>
                            <small class="text-muted fs-6">MAD</small>
                        </div>
                        <small class="text-muted">Total donné (confirmé)</small>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3 py-3">
                    <div class="bg-info bg-opacity-10 text-info rounded-circle d-flex align-items-center justify-content-center"
                         style="width:48px;height:48px;font-size:1.3rem;">
                        <i class="bi bi-people"></i>
                    </div>
                    <div>
                        <div class="fw-bold fs-5" th:text="${totalParticipations}"></div>
                        <small class="text-muted">Participation(s) active(s)</small>
                    </div>
                </div>
            </div>

        </div>

        <!-- Colonne droite : formulaire -->
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
                    <h5 class="fw-bold">
                        <i class="bi bi-pencil-square text-success me-2"></i>Modifier mon profil
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/donnateur/profil}" th:object="${profil}"
                          method="post" novalidate>

                        <!-- Informations personnelles -->
                        <h6 class="text-muted text-uppercase small fw-semibold mb-3">
                            Informations personnelles
                        </h6>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{prenom}"
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{prenom}"></div>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{nom}"
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control"
                                   th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <hr class="my-4">

                        <!-- Changement de mot de passe -->
                        <h6 class="text-muted text-uppercase small fw-semibold mb-1">
                            Changer le mot de passe
                        </h6>
                        <p class="text-muted small mb-3">Laissez vide si vous ne souhaitez pas changer votre mot de passe.</p>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mot de passe actuel</label>
                            <input type="password" class="form-control"
                                   th:field="*{motDePasseActuel}"
                                   placeholder="Requis uniquement si vous changez le mot de passe"
                                   autocomplete="current-password">
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label fw-semibold">Nouveau mot de passe</label>
                                <input type="password" class="form-control"
                                       th:field="*{nouveauMotDePasse}"
                                       placeholder="Nouveau mot de passe"
                                       autocomplete="new-password">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Confirmer</label>
                                <input type="password" class="form-control"
                                       th:field="*{confirmMotDePasse}"
                                       placeholder="Confirmer le nouveau mot de passe"
                                       autocomplete="new-password">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save me-1"></i>Enregistrer
                            </button>
                            <a th:href="@{/donnateur/dashboard}" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<footer class="bg-success text-white text-center py-3">
    <small>&copy; 2026 GestionCharité</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
