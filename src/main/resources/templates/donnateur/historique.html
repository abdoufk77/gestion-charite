<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historique des dons</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{donnateur/fragments/navbar :: navbar('dons')}"></div>

<div class="container mt-4 mb-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-clock-history text-success me-2"></i>Historique de mes dons
        </h4>
        <span class="badge bg-success fs-6" th:text="${pageDons.totalElements + ' don(s)'}"></span>
    </div>

    <!-- Vide -->
    <div th:if="${pageDons.totalElements == 0}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5 text-muted">
            <i class="bi bi-inbox" style="font-size:3rem;"></i>
            <p class="mt-3 mb-0">Vous n'avez pas encore effectué de don.</p>
            <a th:href="@{/donnateur/dashboard}" class="btn btn-success mt-3">
                <i class="bi bi-heart-fill me-1"></i>Voir les actions disponibles
            </a>
        </div>
    </div>

    <!-- Tableau -->
    <div th:if="${pageDons.totalElements > 0}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Action caritative</th>
                        <th>Organisation</th>
                        <th class="text-end">Montant</th>
                        <th>Méthode</th>
                        <th>Date</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="don, iter : ${pageDons.content}">
                        <td class="text-muted small">
                            <span th:text="${currentPage * 10 + iter.count}"></span>
                        </td>
                        <td>
                            <span class="fw-semibold" th:text="${don.actionCharite.titre}"></span>
                        </td>
                        <td class="text-muted small"
                            th:text="${don.actionCharite.organisation != null ? don.actionCharite.organisation.nom : '—'}">
                        </td>
                        <td class="text-end fw-bold text-success">
                            <span th:text="${#numbers.formatDecimal(don.montant, 0, 'COMMA', 2, 'POINT')}"></span> MAD
                        </td>
                        <td>
                            <span th:if="${don.methodePaiement != null and don.methodePaiement.name() == 'STRIPE'}"
                                  class="badge bg-light text-dark border">
                                <i class="bi bi-credit-card-2-front me-1"></i>Stripe
                            </span>
                            <span th:if="${don.methodePaiement != null and don.methodePaiement.name() == 'PAYPAL'}"
                                  class="badge bg-light text-dark border">
                                <i class="bi bi-paypal me-1"></i>PayPal
                            </span>
                        </td>
                        <td class="text-muted small">
                            <span th:if="${don.dateDon != null}"
                                  th:text="${#dates.format(don.dateDon, 'dd/MM/yyyy HH:mm')}"></span>
                            <span th:if="${don.dateDon == null}">—</span>
                        </td>
                        <td>
                            <span th:if="${don.statut.name() == 'CONFIRME'}" class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>Confirmé
                            </span>
                            <span th:if="${don.statut.name() == 'EN_ATTENTE'}" class="badge bg-warning text-dark">
                                <i class="bi bi-hourglass-split me-1"></i>En attente
                            </span>
                            <span th:if="${don.statut.name() == 'ANNULE'}" class="badge bg-danger">
                                <i class="bi bi-x-circle me-1"></i>Annulé
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${pageDons.totalPages > 1}" class="card-footer bg-transparent d-flex justify-content-center gap-2 py-3">
            <a th:href="@{/donnateur/historique(page=${currentPage - 1})}"
               th:classappend="${currentPage == 0} ? 'disabled'"
               class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-chevron-left"></i>
            </a>
            <span th:each="i : ${#numbers.sequence(0, pageDons.totalPages - 1)}">
                <a th:href="@{/donnateur/historique(page=${i})}"
                   class="btn btn-sm"
                   th:classappend="${i == currentPage} ? 'btn-success' : 'btn-outline-secondary'"
                   th:text="${i + 1}"></a>
            </span>
            <a th:href="@{/donnateur/historique(page=${currentPage + 1})}"
               th:classappend="${currentPage == pageDons.totalPages - 1} ? 'disabled'"
               class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>
</div>

<footer class="bg-success text-white text-center py-3">
    <small>&copy; 2026 GestionCharité</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
