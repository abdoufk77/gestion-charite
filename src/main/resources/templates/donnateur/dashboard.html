<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Espace Donateur</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{donnateur/fragments/navbar :: navbar('home')}"></div>

<!-- En-tête profil -->
<div class="container mt-4 mb-4">
    <!-- Alertes flash -->
    <div th:if="${succes}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${succes}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erreur}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${erreur}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm p-4 bg-white">
        <div class="d-flex align-items-center gap-3">
            <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center"
                 style="width:56px;height:56px;font-size:1.5rem;">
                <span th:text="${#strings.substring(utilisateur.prenom,0,1).toUpperCase()}"></span>
            </div>
            <div>
                <h4 class="mb-0" th:text="${utilisateur.prenom + ' ' + utilisateur.nom}"></h4>
                <small class="text-muted" th:text="${utilisateur.email}"></small>
                <span class="badge bg-success ms-2">Donateur</span>
            </div>
        </div>
    </div>
</div>

<!-- Actions disponibles -->
<div class="container mb-5">
    <h5 class="mb-3 text-secondary fw-semibold">
        <i class="bi bi-heart-fill text-success me-2"></i>Actions caritatives disponibles
    </h5>

    <div th:if="${#lists.isEmpty(actions)}" class="alert alert-info">
        Aucune action caritative disponible pour le moment.
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${!#lists.isEmpty(actions)}">
        <div class="col" th:each="action : ${actions}" th:if="${action.typeAction != null}">
            <div class="card h-100 shadow-sm border-0">
                <!-- Image de l'action -->
                <img th:src="${action.imageUrl != null ? action.imageUrl : '/images/default-action.svg'}"
                     class="card-img-top"
                     style="height:160px;object-fit:cover;"
                     th:alt="${action.titre}">
                <div class="card-body pb-2">
                    <!-- Badges catégorie + type -->
                    <div class="d-flex gap-2 mb-2 flex-wrap">
                        <span class="badge bg-secondary" th:text="${action.categorie}"></span>
                        <span th:if="${action.typeAction.name() == 'FINANCIER'}"
                              class="badge bg-success">
                            <i class="bi bi-cash-coin me-1"></i>Collecte financière
                        </span>
                        <span th:if="${action.typeAction.name() == 'PHYSIQUE'}"
                              class="badge bg-primary">
                            <i class="bi bi-people-fill me-1"></i>Participation physique
                        </span>
                    </div>

                    <h6 class="card-title fw-bold" th:text="${action.titre}"></h6>
                    <p class="card-text text-muted small" th:text="${action.description}"></p>
                    <p class="mb-2">
                        <small class="text-muted">
                            <i class="bi bi-building me-1"></i>
                            <strong th:text="${action.organisation != null ? action.organisation.nom : 'N/A'}"></strong>
                        </small>
                    </p>

                    <!-- Barre de progression — FINANCIER -->
                    <div th:if="${action.typeAction.name() == 'FINANCIER' and action.objectifMontant != null}"
                         th:with="collecte=${montantsCollectes[action.id] ?: 0.0},
                                  pct=${collecte >= action.objectifMontant ? 100 : collecte * 100 / action.objectifMontant}">
                        <div class="d-flex justify-content-between small mb-1">
                            <span class="text-success fw-semibold">
                                <span th:text="${#numbers.formatDecimal(collecte, 0, 'COMMA', 0, 'POINT')}"></span> MAD collectés
                            </span>
                            <span class="text-muted">
                                Objectif : <span th:text="${#numbers.formatDecimal(action.objectifMontant, 0, 'COMMA', 0, 'POINT')}"></span> MAD
                            </span>
                        </div>
                        <div class="progress mb-2" style="height:8px;">
                            <div class="progress-bar bg-success"
                                 th:style="'width:' + ${pct} + '%'"
                                 th:attr="aria-valuenow=${pct}"></div>
                        </div>
                    </div>

                    <!-- Places restantes — PHYSIQUE -->
                    <div th:if="${action.typeAction.name() == 'PHYSIQUE' and action.nombrePlacesMax != null}"
                         th:with="inscrits=${participationsCount[action.id] ?: 0},
                                  restantes=${action.nombrePlacesMax - (participationsCount[action.id] ?: 0)}">
                        <small th:if="${restantes > 0}" class="text-primary">
                            <i class="bi bi-person-check me-1"></i>
                            <span th:text="${restantes}"></span> place(s) restante(s) sur
                            <span th:text="${action.nombrePlacesMax}"></span>
                        </small>
                        <small th:if="${restantes <= 0}" class="text-danger fw-semibold">
                            <i class="bi bi-x-circle me-1"></i>Complet
                        </small>
                    </div>
                </div>

                <div class="card-footer bg-transparent d-flex justify-content-between align-items-center pt-2">
                    <small class="text-muted">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${#dates.format(action.dateDebut, 'dd/MM/yy')}"></span>
                        → <span th:text="${#dates.format(action.dateFin, 'dd/MM/yy')}"></span>
                    </small>

                    <!-- Bouton FINANCIER -->
                    <div th:if="${action.typeAction.name() == 'FINANCIER'}">
                        <a th:href="@{'/donnateur/actions/' + ${action.id} + '/don'}"
                           class="btn btn-success btn-sm">
                            <i class="bi bi-cash-coin me-1"></i>Faire un don
                        </a>
                    </div>

                    <!-- Bouton PHYSIQUE -->
                    <div th:if="${action.typeAction.name() == 'PHYSIQUE'}"
                         th:with="inscrits=${participationsCount[action.id] ?: 0},
                                  dejaInscrit=${actionsInscrites.contains(action.id)},
                                  complet=${action.nombrePlacesMax != null and inscrits >= action.nombrePlacesMax}">
                        <form th:if="${!dejaInscrit and !complet}"
                              th:action="@{'/donnateur/actions/' + ${action.id} + '/participer'}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="bi bi-person-plus me-1"></i>Participer
                            </button>
                        </form>
                        <span th:if="${dejaInscrit}" class="badge bg-success py-2 px-3">
                            <i class="bi bi-check-circle me-1"></i>Inscrit
                        </span>
                        <span th:if="${!dejaInscrit and complet}" class="badge bg-danger py-2 px-3">
                            <i class="bi bi-x-circle me-1"></i>Complet
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-success text-white text-center py-3">
    <small>&copy; 2026 GestionCharité</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
