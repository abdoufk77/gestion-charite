<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">GestionCharité</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navDonateur">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navDonateur">
            <!-- Liens de navigation -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'home'} ? 'active fw-semibold'"
                       th:href="@{/donnateur/dashboard}">
                        <i class="bi bi-house me-1"></i>Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'dons'} ? 'active fw-semibold'"
                       th:href="@{/donnateur/historique}">
                        <i class="bi bi-clock-history me-1"></i>Mes dons
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'participations'} ? 'active fw-semibold'"
                       th:href="@{/donnateur/participations}">
                        <i class="bi bi-people me-1"></i>Mes participations
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'profil'} ? 'active fw-semibold'"
                       th:href="@{/donnateur/profil}">
                        <i class="bi bi-person-circle me-1"></i>Profil
                    </a>
                </li>
            </ul>

            <!-- Nom + Déconnexion -->
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text text-white">
                    <i class="bi bi-person-fill me-1"></i>
                    <strong th:text="${utilisateur.prenom + ' ' + utilisateur.nom}"></strong>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
