<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inscriptions — Super Admin</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{superadmin/fragments/sidebar :: sidebar('inscriptions')}"></div>

    <div class="admin-main">

        <!-- Topbar -->
        <div class="admin-topbar">
            <h5 class="mb-0 fw-bold text-success">
                <i class="bi bi-person-check-fill me-2"></i>Liste des inscriptions
            </h5>
            <span class="badge bg-warning text-dark"
                  th:text="${pendingOrganisations.size()} + ' en attente'"></span>
        </div>

        <!-- Contenu scrollable -->
        <div class="admin-content">

            <!-- Alertes flash -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-x-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stat rapide -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-warning bg-opacity-10 text-warning rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:48px;height:48px;">
                                <i class="bi bi-hourglass-split fs-5"></i>
                            </div>
                            <div>
                                <div class="fs-4 fw-bold" th:text="${pendingOrganisations.size()}">0</div>
                                <div class="text-muted small">En attente</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- En-tête tableau -->
            <div class="d-flex align-items-center gap-2 mb-3">
                <h6 class="mb-0 text-secondary fw-semibold">Demandes d'inscription</h6>
                <span class="badge bg-success-subtle text-success fw-normal"
                      th:text="${pendingOrganisations.size()} + ' au total'"></span>
            </div>

            <!-- Aucune demande -->
            <div th:if="${pendingOrganisations.isEmpty()}" class="text-center py-5">
                <i class="bi bi-inbox text-muted" style="font-size:2.5rem;"></i>
                <p class="text-muted mt-2">Aucune demande en attente.</p>
            </div>

            <!-- Tableau -->
            <div th:if="${!pendingOrganisations.isEmpty()}">
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">#</th>
                                    <th>Organisation</th>
                                    <th>Contact</th>
                                    <th>Adresse légale</th>
                                    <th>N° Fiscal</th>
                                    <th>Description</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="org : ${pendingOrganisations}">
                                    <td class="ps-3 text-muted" th:text="${org.id}"></td>
                                    <td class="fw-semibold" th:text="${org.nom}"></td>
                                    <td th:text="${org.contactPrincipal}"></td>
                                    <td th:text="${org.adresseLegale}"></td>
                                    <td th:text="${org.numIdentFiscale}"></td>
                                    <td>
                                        <span th:text="${org.description}" class="text-truncate d-inline-block"
                                              style="max-width:160px;" th:title="${org.description}"></span>
                                    </td>
                                    <td class="text-center">
                                        <form th:action="@{/superadmin/organisations/{id}/approuver(id=${org.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-success btn-sm"
                                                    onclick="return confirm('Approuver cette organisation ?')">
                                                <i class="bi bi-check-lg me-1"></i>Approuver
                                            </button>
                                        </form>
                                        <form th:action="@{/superadmin/organisations/{id}/rejeter(id=${org.id})}"
                                              method="post" class="d-inline ms-1">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                    onclick="return confirm('Rejeter cette organisation ?')">
                                                <i class="bi bi-x-lg me-1"></i>Rejeter
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
