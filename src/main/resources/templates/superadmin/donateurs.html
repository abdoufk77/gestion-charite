<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donateurs — Super Admin</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{superadmin/fragments/sidebar :: sidebar('donateurs')}"></div>

    <div class="admin-main">

        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <h5 class="mb-0 fw-bold text-success">
                    <i class="bi bi-people-fill me-2"></i>Donateurs
                </h5>
                <span class="badge bg-success-subtle text-success fw-normal"
                      th:text="${pagedonateurs.totalElements} + ' au total'"></span>
            </div>
        </div>

        <!-- Contenu scrollable -->
        <div class="admin-content">

            <!-- Alertes flash -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-x-circle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stats compactes -->
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="text-muted small">
                    <i class="bi bi-people text-success me-1"></i>
                    <strong th:text="${pagedonateurs.totalElements}"></strong> donateur(s)
                </span>
                <span class="text-muted small">·</span>
                <span class="text-muted small">
                    <i class="bi bi-person-check text-success me-1"></i>
                    <strong th:text="${activeCount}"></strong> actif(s)
                </span>
            </div>

            <!-- Barre de recherche + filtre -->
            <form th:action="@{/superadmin/donateurs}" method="get"
                  class="card border-0 shadow-sm mb-3 p-3">
                <div class="row g-2 align-items-end">

                    <div class="col-12 col-md-5">
                        <label class="form-label small fw-semibold text-muted mb-1">Recherche</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-muted"></i>
                            </span>
                            <input type="text" name="search" class="form-control border-start-0 ps-0"
                                   th:value="${search}"
                                   placeholder="Nom, prénom ou email...">
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label small fw-semibold text-muted mb-1">Statut</label>
                        <select name="enabled" class="form-select">
                            <option value="">Tous les donateurs</option>
                            <option value="true"  th:selected="${enabled != null and enabled}">Actifs</option>
                            <option value="false" th:selected="${enabled != null and !enabled}">Inactifs</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3 d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="bi bi-funnel me-1"></i>Filtrer
                        </button>
                        <a th:href="@{/superadmin/donateurs}"
                           th:if="${search != '' || enabled != null}"
                           class="btn btn-outline-secondary" title="Réinitialiser">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>

                </div>
            </form>

            <!-- Info résultats filtrés -->
            <div th:if="${search != '' || enabled != null}" class="text-muted small mb-2">
                <i class="bi bi-funnel-fill me-1 text-success"></i>
                Résultats filtrés :
                <strong th:text="${pagedonateurs.totalElements}"></strong> donateur(s)
                <span th:if="${search != ''}"> pour "<em th:text="${search}"></em>"</span>
                <span th:if="${enabled != null}">
                    · <span class="badge bg-success" th:text="${enabled} ? 'Actifs' : 'Inactifs'"></span>
                </span>
            </div>

            <!-- Aucun résultat -->
            <div th:if="${pagedonateurs.totalElements == 0}" class="text-center py-5">
                <i class="bi bi-search text-muted" style="font-size:2.5rem;"></i>
                <p class="text-muted mt-3"
                   th:text="${search != '' || enabled != null} ? 'Aucun donateur ne correspond à votre recherche.' : 'Aucun donateur enregistré.'"></p>
                <a th:if="${search != '' || enabled != null}"
                   th:href="@{/superadmin/donateurs}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x-circle me-1"></i>Effacer les filtres
                </a>
            </div>

            <!-- Tableau -->
            <div th:if="${pagedonateurs.totalElements > 0}">
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">#</th>
                                    <th>Nom</th>
                                    <th>Prénom</th>
                                    <th>Email</th>
                                    <th class="text-center">Statut</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="donateur : ${pagedonateurs.content}">
                                    <td class="ps-3 text-muted" th:text="${donateur.id}"></td>
                                    <td class="fw-semibold" th:text="${donateur.nom}"></td>
                                    <td th:text="${donateur.prenom}"></td>
                                    <td>
                                        <span class="d-flex align-items-center gap-1">
                                            <i class="bi bi-envelope text-muted" style="font-size:.85rem;"></i>
                                            <span th:text="${donateur.email}"></span>
                                        </span>
                                    </td>
                                    <td class="text-center">
                                        <span th:if="${donateur.enabled}" class="badge bg-success">
                                            <i class="bi bi-person-check-fill me-1"></i>Actif
                                        </span>
                                        <span th:if="${!donateur.enabled}" class="badge bg-secondary">
                                            <i class="bi bi-person-slash me-1"></i>Inactif
                                        </span>
                                    </td>
                                    <td class="text-center">
                                        <form th:action="@{/superadmin/donateurs/{id}/toggle(id=${donateur.id})}"
                                              method="post" class="d-inline">
                                            <button th:if="${donateur.enabled}" type="submit"
                                                    class="btn btn-outline-danger btn-sm"
                                                    onclick="return confirm('Désactiver ce compte donateur ?')">
                                                <i class="bi bi-person-slash me-1"></i>Désactiver
                                            </button>
                                            <button th:if="${!donateur.enabled}" type="submit"
                                                    class="btn btn-outline-success btn-sm"
                                                    onclick="return confirm('Activer ce compte donateur ?')">
                                                <i class="bi bi-person-check me-1"></i>Activer
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="d-flex align-items-center justify-content-between">
                    <small class="text-muted">
                        Page <strong th:text="${currentPage + 1}"></strong>
                        sur <strong th:text="${pagedonateurs.totalPages}"></strong>
                        &mdash; <span th:text="${pagedonateurs.totalElements}"></span> résultat(s)
                    </small>

                    <nav th:if="${pagedonateurs.totalPages > 1}">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/superadmin/donateurs(page=${currentPage - 1}, search=${search}, enabled=${enabled})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0, pagedonateurs.totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{/superadmin/donateurs(page=${i}, search=${search}, enabled=${enabled})}"
                                   th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage + 1 >= pagedonateurs.totalPages} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/superadmin/donateurs(page=${currentPage + 1}, search=${search}, enabled=${enabled})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

            </div>

        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
