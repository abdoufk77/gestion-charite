<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard — Super Admin</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin-layout.css}" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{superadmin/fragments/sidebar :: sidebar('dashboard')}"></div>

    <div class="admin-main">

        <!-- Topbar -->
        <div class="admin-topbar">
            <h5 class="mb-0 fw-bold text-success">
                <i class="bi bi-house-fill me-2"></i>Dashboard
            </h5>
        </div>

        <!-- Contenu scrollable -->
        <div class="admin-content">

            <!-- Cartes stats -->
            <div class="row g-3 mb-4">

                <div class="col-sm-6 col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-success bg-opacity-10 text-success rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:52px;height:52px;">
                                <i class="bi bi-building-fill fs-4"></i>
                            </div>
                            <div>
                                <div class="fs-3 fw-bold" th:text="${totalOrganisations}">0</div>
                                <div class="text-muted small">Total organisations</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:52px;height:52px;">
                                <i class="bi bi-check-circle-fill fs-4"></i>
                            </div>
                            <div>
                                <div class="fs-3 fw-bold" th:text="${activeOrganisations}">0</div>
                                <div class="text-muted small">Organisations actives</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-warning bg-opacity-10 text-warning rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:52px;height:52px;">
                                <i class="bi bi-hourglass-split fs-4"></i>
                            </div>
                            <div>
                                <div class="fs-3 fw-bold" th:text="${pendingCount}">0</div>
                                <div class="text-muted small">En attente</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="bg-info bg-opacity-10 text-info rounded-3 d-flex align-items-center justify-content-center"
                                 style="width:52px;height:52px;">
                                <i class="bi bi-people-fill fs-4"></i>
                            </div>
                            <div>
                                <div class="fs-3 fw-bold" th:text="${totalDonateurs}">0</div>
                                <div class="text-muted small">Total donateurs</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Raccourcis -->
            <div class="row g-3">
                <div class="col-md-4">
                    <a th:href="@{/superadmin/dashboard}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-warning bg-opacity-10 text-warning rounded-3 d-flex align-items-center justify-content-center"
                                     style="width:44px;height:44px;">
                                    <i class="bi bi-person-check-fill fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-semibold text-dark">Inscriptions en attente</div>
                                    <small class="text-muted">Approuver ou rejeter des demandes</small>
                                </div>
                                <i class="bi bi-chevron-right text-muted ms-auto"></i>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/superadmin/organisations}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-success bg-opacity-10 text-success rounded-3 d-flex align-items-center justify-content-center"
                                     style="width:44px;height:44px;">
                                    <i class="bi bi-building-fill fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-semibold text-dark">Liste des organisations</div>
                                    <small class="text-muted">Voir toutes les organisations</small>
                                </div>
                                <i class="bi bi-chevron-right text-muted ms-auto"></i>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/superadmin/donateurs}" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-info bg-opacity-10 text-info rounded-3 d-flex align-items-center justify-content-center"
                                     style="width:44px;height:44px;">
                                    <i class="bi bi-people-fill fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-semibold text-dark">Liste des donateurs</div>
                                    <small class="text-muted">Voir tous les donateurs inscrits</small>
                                </div>
                                <i class="bi bi-chevron-right text-muted ms-auto"></i>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

        </div><!-- fin admin-content -->

        <footer class="admin-footer">&copy; 2026 GestionCharité</footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
