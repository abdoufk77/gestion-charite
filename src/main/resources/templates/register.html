<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Créer un compte</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">

    <div class="card shadow p-4 auth-card">

        <h3 class="text-center mb-3">Créer un compte</h3>

        <!-- Message erreur -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">

            <!-- Select type de compte (en haut) -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Je m'inscris en tant que</label>
                <select name="typeCompte" id="typeCompte" class="form-select" required onchange="toggleOrgFields()">
                    <option value="" disabled selected>-- Choisissez un type de compte --</option>
                    <option value="DONATEUR">Donateur</option>
                    <option value="ORGANISATION">Organisation</option>
                </select>
            </div>

            <!-- Champs communs -->
            <div class="mb-3">
                <input type="text" name="nom" class="form-control"
                       placeholder="Nom" required>
            </div>

            <div class="mb-3">
                <input type="text" name="prenom" class="form-control"
                       placeholder="Prénom" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control"
                       placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control"
                       placeholder="Mot de passe" required>
            </div>

            <div class="mb-3">
                <input type="password" name="confirmPassword" class="form-control"
                       placeholder="Confirmer mot de passe" required>
            </div>

            <!-- Champs spécifiques Organisation (masqués par défaut) -->
            <div id="orgFields" style="display:none;">
                <hr class="my-3">
                <p class="text-muted small mb-3">Informations de votre organisation</p>

                <div class="mb-3">
                    <input type="text" name="nomOrganisation" id="nomOrganisation" class="form-control"
                           placeholder="Nom de l'organisation">
                </div>

                <div class="mb-3">
                    <input type="text" name="adresseLegale" class="form-control"
                           placeholder="Adresse légale">
                </div>

                <div class="mb-3">
                    <input type="text" name="numIdentFiscale" class="form-control"
                           placeholder="Numéro d'identification fiscale">
                </div>

                <div class="mb-3">
                    <textarea name="descriptionOrg" class="form-control" rows="3"
                              placeholder="Description de l'organisation"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-2">
                S'inscrire
            </button>

            <p class="text-center mt-3">
                Déjà un compte ?
                <a th:href="@{/login}">Se connecter</a>
            </p>

        </form>

    </div>

</div>

<script>
    function toggleOrgFields() {
        const type = document.getElementById('typeCompte').value;
        const orgFields = document.getElementById('orgFields');
        const nomOrg = document.getElementById('nomOrganisation');

        if (type === 'ORGANISATION') {
            orgFields.style.display = 'block';
            nomOrg.required = true;
        } else {
            orgFields.style.display = 'none';
            nomOrg.required = false;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
